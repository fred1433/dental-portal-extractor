services:
  - type: web
    name: dnoa-portal-demo
    env: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/fred1433/dnoa-portal-web
    branch: master
    envVars:
      - key: DNOA_USERNAME
        sync: false  # Set in Render dashboard
      - key: DNOA_PASSWORD
        sync: false  # Set in Render dashboard
      - key: API_KEY
        value: demo2024secure
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000